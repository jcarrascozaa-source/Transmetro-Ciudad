<!DOCTYPE html>
<html>

<head>

    <title>
        Sistema Transmetro
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/dashboard">

            🚍 Transmetro

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="menu">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="/dashboard">

                        Dashboard

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/buses">

                        Buses

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/lineas">

                        Líneas

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/estaciones">

                        Estaciones

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/empleados">

                        Empleados

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/accesos">

                        Accesos

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/parqueos">

                        Parqueos

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/municipalidades">

                        Municipalidades

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/linea_estaciones">

                        Rutas

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block contenido %}
    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
